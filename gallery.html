<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>时光明信片 · 侯小雯</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- 🏡 森林农场装饰元素 -->
  <div class="cloud cloud-1"></div>
  <div class="cloud cloud-2"></div>
  <div class="cloud cloud-3"></div>

  <div class="butterfly butterfly-1">🦋</div>
  <div class="butterfly butterfly-2">🐝</div>

  <div class="star star-1">✦</div>
  <div class="star star-2">✧</div>
  <div class="star star-3">✦</div>

  <div class="forest-decor tree-1">🌲</div>
  <div class="forest-decor tree-2">🌳</div>
  <div class="forest-decor tree-3">🌲</div>
  <div class="forest-decor tree-4">🌳</div>

  <div class="forest-decor mushroom-1">🍄</div>
  <div class="forest-decor mushroom-2">🍄</div>

  <div class="forest-decor flower-1">🌼</div>
  <div class="forest-decor flower-2">🌸</div>
  <div class="forest-decor flower-3">🌺</div>

  <div class="rabbit">🐰</div>
  <div class="bird">🐦</div>

  <nav class="nav">
    <a class="nav-brand" href="index.html">侯小雯</a>
    <div class="nav-menu">
      <a class="nav-link" href="index.html">首页</a>
      <a class="nav-link" href="blog.html">日志</a>
      <a class="nav-link" href="portfolio.html">作品集</a>
      <a class="nav-link active" href="gallery.html">时光明信片</a>
      <a class="nav-link" href="me.html">我</a>
      <a class="lang-switch" href="gallery-en.html">EN 🇬🇧</a>
    </div>
  </nav>

  <div class="container">

    <div class="page-header">
      <h1 class="page-title">📮 时光明信片</h1>
      <p class="page-subtitle">点击下方的木制邮箱，随机抽一张来自过去的时光明信片 ✉️</p>
    </div>

    <!-- ✉️ 大信箱 - 木质童话风格 -->
    <div class="mailbox-section">
      <div class="mailbox-wrapper-big" id="mailbox">

        <!-- 云朵提示 -->
        <div class="mailbox-cloud" id="mailbox-hint">
          <span>点我 📬 随机抽一张</span>
        </div>

        <!-- 信箱本体：顶部弧形盖 + 长方形木箱 -->
        <div class="wood-mailbox">

          <!-- 信箱顶盖 -->
          <div class="wood-top">
            <!-- 投信口 -->
            <div class="wood-slot"></div>
            <!-- 顶盖装饰线 -->
            <div class="wood-top-line"></div>
          </div>

          <!-- 信箱主身 -->
          <div class="wood-body">
            <!-- 小门 -->
            <div class="wood-door">
              <div class="wood-door-label">MAIL</div>
              <div class="wood-door-knob"></div>
            </div>

            <!-- 装饰木纹 -->
            <div class="wood-grain wood-grain-1"></div>
            <div class="wood-grain wood-grain-2"></div>
            <div class="wood-grain wood-grain-3"></div>

            <!-- 小装饰花朵 -->
            <div class="wood-decor">🌸</div>
          </div>

          <!-- 木柱 -->
          <div class="wood-post">
            <div class="wood-post-grain wood-post-grain-1"></div>
            <div class="wood-post-grain wood-post-grain-2"></div>
          </div>

          <!-- 地面影子 -->
          <div class="mailbox-ground-shadow"></div>

          <!-- 周围飞着的小花瓣 -->
          <span class="mailbox-petal p1">🌸</span>
          <span class="mailbox-petal p2">✨</span>
          <span class="mailbox-petal p3">🌸</span>
        </div>

      </div>
    </div>

    <!-- 📬 随机明信片弹窗 -->
    <div id="postcard-modal" class="postcard-modal">
      <div class="postcard-inner" id="postcard-inner">
        <button class="postcard-close" id="postcard-close">×</button>
        <div class="postcard-stamp">📮</div>
        <div class="postcard-image-wrap">
          <img id="postcard-img" src="" alt="postcard" />
        </div>
        <div class="postcard-content">
          <div class="postcard-timestamp" id="postcard-timestamp"></div>
          <div class="postcard-title" id="postcard-title"></div>
          <div class="postcard-caption" id="postcard-caption"></div>
          <div class="postcard-footer">
            <span id="postcard-footer">— 来自某片被阳光晒过的时光</span>
            <button class="btn btn-primary" id="postcard-again" style="padding:8px 16px;font-size:13px;">再抽一张 🎲</button>
          </div>
        </div>
      </div>
    </div>

    <div class="content-section">
      <div class="section-heading">
        <h2>✎ 照片墙</h2>
        <span class="sub">Photo Wall</span>
      </div>
      <div id="photo-grid"></div>
    </div>

  </div>

  <!-- 🌲 底部森林场景 -->
  <div class="scene-footer">
    <div class="grass-line">🌿🌿🌿🌿🌿🌿🌿🌿🌿🌿🌿🌿🌿</div>
    <div class="forest-ground">
      <span>🏡</span><span>🌳</span><span>🌲</span><span>🍄</span><span>🌼</span><span>🐑</span><span>🌲</span><span>🌳</span><span>🌾</span><span>🐄</span><span>🌲</span><span>🍄</span><span>🌸</span>
    </div>
    <p class="forest-quote">~ 在数字世界里种一片小森林 ~</p>
  </div>

  <footer class="footer">
    <p>© 2025 侯小雯 · Made with <span class="footer-heart">♥</span></p>
  </footer>

  <!-- ================ Lightbox · 灯箱 ================ -->
  <div id="lightbox" class="lightbox">
    <button class="lightbox-nav lightbox-prev" id="lightbox-prev">‹</button>
    <div class="lightbox-content" id="lightbox-content"></div>
    <button class="lightbox-nav lightbox-next" id="lightbox-next">›</button>
    <button class="lightbox-close" id="lightbox-close">×</button>
  </div>

  <script src="gallery.js"></script>
</body>
</html>
