<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>时光明信片 · 侯小雯</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- 🏡 森林农场装饰元素 -->
  <div class="cloud cloud-1"></div>
  <div class="cloud cloud-2"></div>
  <div class="cloud cloud-3"></div>

  <div class="butterfly butterfly-1">🦋</div>
  <div class="butterfly butterfly-2">🐝</div>

  <div class="star star-1">✦</div>
  <div class="star star-2">✧</div>
  <div class="star star-3">✦</div>

  <div class="forest-decor tree-1">🌲</div>
  <div class="forest-decor tree-2">🌳</div>
  <div class="forest-decor tree-3">🌲</div>
  <div class="forest-decor tree-4">🌳</div>

  <div class="forest-decor mushroom-1">🍄</div>
  <div class="forest-decor mushroom-2">🍄</div>

  <div class="forest-decor flower-1">🌼</div>
  <div class="forest-decor flower-2">🌸</div>
  <div class="forest-decor flower-3">🌺</div>

  <div class="rabbit">🐰</div>
  <div class="bird">🐦</div>

  <nav class="nav">
    <a class="nav-brand" href="index.html">侯小雯</a>
    <div class="nav-menu">
      <a class="nav-link" href="index.html">首页</a>
      <a class="nav-link" href="blog.html">日志</a>
      <a class="nav-link" href="portfolio.html">作品集</a>
      <a class="nav-link active" href="gallery.html">时光明信片</a>
      <a class="nav-link" href="me.html">我</a>
      <a class="lang-switch" href="gallery-en.html">EN 🇬🇧</a>
    </div>
  </nav>

  <div class="container">

    <div class="page-header">
      <h1 class="page-title">📮 时光明信片</h1>
      <p class="page-subtitle">点击下方的木制邮箱，随机抽一张来自过去的时光明信片 ✉️</p>
    </div>

    <!-- ✉️ 大信箱 - 木质童话风格 -->
    <div class="mailbox-section">
      <div class="mailbox-wrapper-big" id="mailbox">

        <!-- 云朵提示 -->
        <div class="mailbox-cloud" id="mailbox-hint">
          <span>点我 📬 随机抽一张</span>
        </div>

        <!-- 信箱本体：顶部弧形盖 + 长方形木箱 -->
        <div class="wood-mailbox">

          <!-- 信箱顶盖 -->
          <div class="wood-top">
            <!-- 投信口 -->
            <div class="wood-slot"></div>
            <!-- 顶盖装饰线 -->
            <div class="wood-top-line"></div>
          </div>

          <!-- 信箱主身 -->
          <div class="wood-body">
            <!-- 小门 -->
            <div class="wood-door">
              <div class="wood-door-label">MAIL</div>
              <div class="wood-door-knob"></div>
            </div>

            <!-- 装饰木纹 -->
            <div class="wood-grain wood-grain-1"></div>
            <div class="wood-grain wood-grain-2"></div>
            <div class="wood-grain wood-grain-3"></div>

            <!-- 小装饰花朵 -->
            <div class="wood-decor">🌸</div>
          </div>

          <!-- 木柱 -->
          <div class="wood-post">
            <div class="wood-post-grain wood-post-grain-1"></div>
            <div class="wood-post-grain wood-post-grain-2"></div>
          </div>

          <!-- 地面影子 -->
          <div class="mailbox-ground-shadow"></div>

          <!-- 周围飞着的小花瓣 -->
          <span class="mailbox-petal p1">🌸</span>
          <span class="mailbox-petal p2">✨</span>
          <span class="mailbox-petal p3">🌸</span>
        </div>

      </div>
    </div>

    <!-- 📬 随机明信片弹窗 -->
    <div id="postcard-modal" class="postcard-modal">
      <div class="postcard-inner" id="postcard-inner">
        <button class="postcard-close" id="postcard-close">×</button>
        <div class="postcard-stamp">📮</div>
        <div class="postcard-image-wrap">
          <img id="postcard-img" src="" alt="postcard" />
        </div>
        <div class="postcard-content">
          <div class="postcard-timestamp" id="postcard-timestamp"></div>
          <div class="postcard-title" id="postcard-title"></div>
          <div class="postcard-caption" id="postcard-caption"></div>
          <div class="postcard-footer">
            <span id="postcard-footer">— 来自某片被阳光晒过的时光</span>
            <button class="btn btn-primary" id="postcard-again" style="padding:8px 16px;font-size:13px;">再抽一张 🎲</button>
          </div>
        </div>
      </div>
    </div>

    <div class="content-section">
      <div class="section-heading">
        <h2>✎ 照片墙</h2>
        <span class="sub">Photo Wall</span>
      </div>
      <div id="photo-grid"></div>
    </div>

  </div>

  <!-- 🌲 底部森林场景 · 像素松树 + 跳动小兔 -->
  <div class="scene-footer">
    <div class="pixel-forest">
      <!-- 左侧松树组 -->
      <div class="pine-trees-left">
        <svg class="pine-tree small" viewBox="0 0 40 60" xmlns="http://www.w3.org/2000/svg">
          <!-- 松树 - 分层三角形 -->
          <!-- 最下层三角 -->
          <polygon points="20,50 3,38 37,38" fill="#7ab088" />
          <polygon points="20,45 7,36 33,36" fill="#8cc098" />
          <!-- 中层三角 -->
          <polygon points="20,38 7,26 33,26" fill="#8cc098" />
          <polygon points="20,33 9,24 31,24" fill="#a0d0aa" />
          <!-- 上层三角 -->
          <polygon points="20,26 9,14 31,14" fill="#a0d0aa" />
          <polygon points="20,20 11,12 29,12" fill="#b3d8b8" />
          <!-- 顶点 -->
          <polygon points="20,14 13,6 27,6" fill="#b3d8b8" />
          <polygon points="20,10 15,4 25,4" fill="#c0e0c0" />
          <!-- 树干 -->
          <rect x="17" y="50" width="6" height="8" fill="#5c4530" />
        </svg>
        <svg class="pine-tree medium" viewBox="0 0 40 60" xmlns="http://www.w3.org/2000/svg">
          <polygon points="20,50 2,36 38,36" fill="#6aa078" />
          <polygon points="20,43 5,32 35,32" fill="#7ab088" />
          <polygon points="20,35 6,22 34,22" fill="#8cc098" />
          <polygon points="20,26 7,12 33,12" fill="#a0d0aa" />
          <polygon points="20,16 10,4 30,4" fill="#b3d8b8" />
          <rect x="17" y="50" width="6" height="8" fill="#5c4530" />
        </svg>
        <svg class="pine-tree" viewBox="0 0 40 60" xmlns="http://www.w3.org/2000/svg">
          <polygon points="20,50 1,35 39,35" fill="#5a9a6a" />
          <polygon points="20,42 3,30 37,30" fill="#6aa078" />
          <polygon points="20,33 5,18 35,18" fill="#7ab088" />
          <polygon points="20,22 7,8 33,8" fill="#8cc098" />
          <polygon points="20,10 12,2 28,2" fill="#a0d0aa" />
          <rect x="17" y="50" width="6" height="8" fill="#5c4530" />
        </svg>
      </div>

      <!-- 中间兔子 -->
      <div class="pixel-rabbit-wrap">
        <div class="pixel-rabbit-shadow"></div>
        <svg class="pixel-rabbit" viewBox="0 0 60 70" xmlns="http://www.w3.org/2000/svg">
          <!-- 左耳 -->
          <ellipse cx="22" cy="14" rx="5" ry="12" fill="#ffffff" stroke="#e0d8cc" stroke-width="1" />
          <ellipse cx="22" cy="14" rx="2.5" ry="8" fill="#ffb6c1" />
          <!-- 右耳 -->
          <ellipse cx="38" cy="14" rx="5" ry="12" fill="#ffffff" stroke="#e0d8cc" stroke-width="1" />
          <ellipse cx="38" cy="14" rx="2.5" ry="8" fill="#ffb6c1" />
          <!-- 身体（圆滚滚的） -->
          <ellipse cx="30" cy="50" rx="18" ry="14" fill="#ffffff" stroke="#e0d8cc" stroke-width="1" />
          <!-- 头部 -->
          <circle cx="30" cy="32" r="14" fill="#ffffff" stroke="#e0d8cc" stroke-width="1" />
          <!-- 左黑眼 -->
          <circle cx="24" cy="30" r="2.5" fill="#2a2a2a" />
          <circle cx="24.5" cy="29.5" r="0.8" fill="#ffffff" />
          <!-- 右黑眼 -->
          <circle cx="36" cy="30" r="2.5" fill="#2a2a2a" />
          <circle cx="36.5" cy="29.5" r="0.8" fill="#ffffff" />
          <!-- 鼻子 -->
          <ellipse cx="30" cy="35" rx="1.5" ry="1" fill="#ff9aa8" />
          <!-- 嘴巴 -->
          <path d="M 28 37 Q 30 39 32 37" stroke="#2a2a2a" stroke-width="1" fill="none" />
          <!-- 腮红 -->
          <circle cx="21" cy="36" r="2" fill="#ffd1dc" opacity="0.7" />
          <circle cx="39" cy="36" r="2" fill="#ffd1dc" opacity="0.7" />
          <!-- 尾巴 -->
          <circle cx="48" cy="48" r="4" fill="#ffffff" stroke="#e0d8cc" stroke-width="1" />
          <!-- 脚 -->
          <ellipse cx="23" cy="62" rx="4" ry="3" fill="#ffffff" stroke="#e0d8cc" stroke-width="1" />
          <ellipse cx="37" cy="62" rx="4" ry="3" fill="#ffffff" stroke="#e0d8cc" stroke-width="1" />
        </svg>
      </div>

      <!-- 右侧松树组 -->
      <div class="pine-trees-right">
        <svg class="pine-tree" viewBox="0 0 40 60" xmlns="http://www.w3.org/2000/svg">
          <polygon points="20,50 1,35 39,35" fill="#5a9a6a" />
          <polygon points="20,42 3,30 37,30" fill="#6aa078" />
          <polygon points="20,33 5,18 35,18" fill="#7ab088" />
          <polygon points="20,22 7,8 33,8" fill="#8cc098" />
          <polygon points="20,10 12,2 28,2" fill="#a0d0aa" />
          <rect x="17" y="50" width="6" height="8" fill="#5c4530" />
        </svg>
        <svg class="pine-tree medium" viewBox="0 0 40 60" xmlns="http://www.w3.org/2000/svg">
          <polygon points="20,50 2,36 38,36" fill="#6aa078" />
          <polygon points="20,43 5,32 35,32" fill="#7ab088" />
          <polygon points="20,35 6,22 34,22" fill="#8cc098" />
          <polygon points="20,26 7,12 33,12" fill="#a0d0aa" />
          <polygon points="20,16 10,4 30,4" fill="#b3d8b8" />
          <rect x="17" y="50" width="6" height="8" fill="#5c4530" />
        </svg>
        <svg class="pine-tree small" viewBox="0 0 40 60" xmlns="http://www.w3.org/2000/svg">
          <polygon points="20,50 3,38 37,38" fill="#7ab088" />
          <polygon points="20,45 7,36 33,36" fill="#8cc098" />
          <polygon points="20,38 7,26 33,26" fill="#8cc098" />
          <polygon points="20,33 9,24 31,24" fill="#a0d0aa" />
          <polygon points="20,26 9,14 31,14" fill="#a0d0aa" />
          <polygon points="20,20 11,12 29,12" fill="#b3d8b8" />
          <polygon points="20,14 13,6 27,6" fill="#b3d8b8" />
          <polygon points="20,10 15,4 25,4" fill="#c0e0c0" />
          <rect x="17" y="50" width="6" height="8" fill="#5c4530" />
        </svg>
      </div>
    </div>
    <p class="forest-quote">~ 在数字世界里种一片小森林 ~</p>
  </div>

  <footer class="footer">
    <p>© 2025 侯小雯 · Made with <span class="footer-heart">♥</span></p>

</body>
</html>
