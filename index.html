<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>侯小雯 · 数字花园</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="styles-home.css" />
</head>
<body class="body-home body-home-simplified">

  <!-- ============ 1️⃣ 背景森林插画 ============ -->
  <div class="bg-layer bg-layer-simplified">
    <div class="bg-img"></div>
    <div class="bg-vignette"></div>
    <!-- 让背景更暗一层以突出熊 -->
    <div class="bg-overlay-tint"></div>
  </div>

  <!-- ============ 2️⃣ 金色光束 ============ -->
  <div class="rays-layer">
    <div class="ray ray-1"></div>
    <div class="ray ray-3"></div>
    <div class="ray ray-5"></div>
  </div>

  <!-- ============ 3️⃣ 柔光光斑 ============ -->
  <div class="bokeh-layer">
    <div class="bokeh bokeh-1"></div>
    <div class="bokeh bokeh-2"></div>
    <div class="bokeh bokeh-5"></div>
    <div class="bokeh bokeh-7"></div>
  </div>

  <!-- ============ 4️⃣ 花瓣粒子层 ============ -->
  <canvas id="petals-canvas" class="petals-canvas"></canvas>

  <!-- ============ 5️⃣ 亮度呼吸 ============ -->
  <div class="breath-layer"></div>

  <!-- ============ 🧭 导航栏 ============ -->
  <nav class="nav nav-transparent">
    <a class="nav-brand nav-brand-white" href="index.html">侯小雯</a>
    <div class="nav-menu">
      <a class="nav-link nav-link-white active" href="index.html">首页</a>
      <a class="nav-link nav-link-white" href="blog.html">日志</a>
      <a class="nav-link nav-link-white" href="portfolio.html">作品集</a>
      <a class="nav-link nav-link-white" href="gallery.html">时光明信片</a>
      <a class="nav-link nav-link-white" href="me.html">我</a>
      <a class="lang-switch lang-switch-white" href="index-en.html">EN 🇬🇧</a>
    </div>
  </nav>

  <!-- ============ 🐻 主交互区：绿色暴力熊 ============ -->
  <div class="container container-home-simplified">

    <!-- 标题 -->
    <div class="home-simplified-title">
      <h1>嗨，我是<span class="name-highlight">侯小雯</span></h1>
      <p>与 AI 同行 · 在数字世界里种一片小森林 🌲</p>
    </div>

    <!-- 大绿熊容器 -->
    <div class="bear-wrap" id="bear-wrap">
      <div class="bear" id="bear">

        <!-- 耳朵 -->
        <div class="bear-ear bear-ear-left"></div>
        <div class="bear-ear bear-ear-right"></div>

        <!-- 头顶装饰（一朵小红花 - 暴力熊特色） -->
        <div class="bear-flower">🌸</div>

        <!-- 脸 -->
        <div class="bear-face">
          <!-- 眼睛：会跟随鼠标 -->
          <div class="bear-eye bear-eye-left">
            <div class="bear-eye-pupil" id="pupil-left"></div>
          </div>
          <div class="bear-eye bear-eye-right">
            <div class="bear-eye-pupil" id="pupil-right"></div>
          </div>
          <!-- 鼻子 -->
          <div class="bear-nose">●</div>
          <!-- 嘴巴 -->
          <div class="bear-mouth">︵</div>
          <!-- 腮红 -->
          <div class="bear-cheek bear-cheek-left"></div>
          <div class="bear-cheek bear-cheek-right"></div>
        </div>

        <!-- 肚子圆 -->
        <div class="bear-belly">
          <div class="bear-belly-shine"></div>
        </div>

        <!-- 身上符号（暴力熊特色 - 一颗 X / 爱心） -->
        <div class="bear-mark">♥</div>

      </div>

      <!-- 熊的影子 -->
      <div class="bear-shadow"></div>

      <!-- 交互提示 -->
      <div class="bear-hint" id="bear-hint">
        👆 点我试试看
      </div>
    </div>

    <!-- ============ 🎴 入口卡片 ============ -->
    <div class="home-entries home-entries-simplified">
      <a href="blog.html" class="entry-card entry-blog">
        <div class="entry-icon">
          <span class="entry-icon-main">📖</span>
        </div>
        <div class="entry-text">
          <h3>日志</h3>
          <p>灵感与日常</p>
        </div>
      </a>

      <a href="portfolio.html" class="entry-card entry-portfolio">
        <div class="entry-icon">
          <span class="entry-icon-main">🎨</span>
        </div>
        <div class="entry-text">
          <h3>作品集</h3>
          <p>AI 产品实验</p>
        </div>
      </a>

      <a href="gallery.html" class="entry-card entry-gallery">
        <div class="entry-icon">
          <span class="entry-icon-main">📮</span>
        </div>
        <div class="entry-text">
          <h3>时光明信片</h3>
          <p>定格的片刻</p>
        </div>
      </a>

      <a href="me.html" class="entry-card entry-me">
        <div class="entry-icon">
          <span class="entry-icon-main">🌿</span>
        </div>
        <div class="entry-text">
          <h3>我</h3>
          <p>关于我的故事</p>
        </div>
      </a>
    </div>

  </div>

  <!-- ============ 🦶 页脚 ============ -->
  <footer class="footer footer-home">
    <p>© 2025 侯小雯 · Made with <span class="footer-heart">♥</span></p>
  </footer>

  <!-- ============ 🎬 粒子动画脚本 ============ -->
  <script src="home-particles.js"></script>

  <!-- ============ 🐻 熊交互脚本 ============ -->
  <script src="home-bear.js"></script>

</body>
</html>
