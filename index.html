  <script>
    /* =========================================================
       🌸 花瓣飘落动画
       ========================================================= */
    (function initPetals() {
      const layer = document.getElementById('petals-layer');
      if (!layer) return;

      const PETAL_COUNT = 35;
      const petalEmojis = ['🌸', '🌸', '🌺', '🌷', '🌼', '🍃', '✨', '🌸'];

      for (let i = 0; i < PETAL_COUNT; i++) {
        const petal = document.createElement('div');
        petal.className = 'petal';

        // 随机属性
        const startX = Math.random() * 100;           // 起始 x（%）
        const fallDuration = 8 + Math.random() * 10;   // 下落时长 8~18s
        const delay = Math.random() * -20;              // 负延迟，让动画错开
        const swayAmount = 30 + Math.random() * 60;    // 左右摇摆幅度
        const size = 14 + Math.random() * 22;          // 大小
        const rotationSpeed = (Math.random() - 0.5) * 720; // 旋转速度
        const emoji = petalEmojis[Math.floor(Math.random() * petalEmojis.length)];
        const opacity = 0.55 + Math.random() * 0.45;

        petal.textContent = emoji;
        petal.style.left = startX + '%';
        petal.style.fontSize = size + 'px';
        petal.style.animationDuration = fallDuration + 's, ' + (fallDuration * 0.5) + 's';
        petal.style.animationDelay = delay + 's, ' + delay + 's';
        petal.style.setProperty('--sway-x', swayAmount + 'px');
        petal.style.setProperty('--rotate-end', rotationSpeed + 'deg');
        petal.style.opacity = opacity;
        petal.style.filter = 'drop-shadow(0 2px 4px rgba(255, 200, 220, 0.5))';

        layer.appendChild(petal);
      }
    })();

    /* =========================================================
       ✨ 漂浮的阳光光点（bokeh）
       ========================================================= */
    (function initSparkles() {
      const layer = document.getElementById('sparkle-layer');
      if (!layer) return;

      const SPARKLE_COUNT = 18;
      for (let i = 0; i < SPARKLE_COUNT; i++) {
        const sparkle = document.createElement('div');
        sparkle.className = 'sparkle';

        const startX = Math.random() * 100;
        const startY = Math.random() * 100;
        const size = 4 + Math.random() * 14;
        const duration = 3 + Math.random() * 5;
        const delay = Math.random() * -8;

        sparkle.style.left = startX + '%';
        sparkle.style.top = startY + '%';
        sparkle.style.width = size + 'px';
        sparkle.style.height = size + 'px';
        sparkle.style.animationDuration = duration + 's';
        sparkle.style.animationDelay = delay + 's';

        layer.appendChild(sparkle);
      }
    })();
  </script>
