<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>侯小雯 · 数字花园</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="styles-home.css" />
</head>
<body class="body-home">

  <!-- ============================================================
       🌳 第 0 层: 静态插画背景
       请把插画保存为 home-bg.jpg 放到项目根目录
       ============================================================ -->
  <div class="bg-layer">
    <div class="bg-img"></div>
    <!-- 轻微的暗角，让画面更像油画 -->
    <div class="bg-vignette"></div>
  </div>

  <!-- ============================================================
       ☀️ 第 1 层: 金色丁达尔光束 (CSS)
       ============================================================ -->
  <div class="rays-layer">
    <div class="ray ray-1"></div>
    <div class="ray ray-2"></div>
    <div class="ray ray-3"></div>
    <div class="ray ray-4"></div>
    <div class="ray ray-5"></div>
    <div class="ray ray-6"></div>
  </div>

  <!-- ============================================================
       ✨ 第 2 层: 圆形柔光光斑 (CSS)
       ============================================================ -->
  <div class="bokeh-layer">
    <div class="bokeh bokeh-1"></div>
    <div class="bokeh bokeh-2"></div>
    <div class="bokeh bokeh-3"></div>
    <div class="bokeh bokeh-4"></div>
    <div class="bokeh bokeh-5"></div>
    <div class="bokeh bokeh-6"></div>
    <div class="bokeh bokeh-7"></div>
  </div>

  <!-- ============================================================
       🌸 第 3 层: Canvas 花瓣粒子 (JS 绘制)
       ============================================================ -->
  <canvas id="petals-canvas" class="petals-canvas"></canvas>

  <!-- ============================================================
       🌙 第 4 层: 全画面亮度呼吸 (CSS)
       ============================================================ -->
  <div class="breath-layer"></div>

  <!-- ============================================================
       🧭 导航栏 (半透明磨砂玻璃)
       ============================================================ -->
  <nav class="nav nav-transparent">
    <a class="nav-brand nav-brand-white" href="index.html">侯小雯</a>
    <div class="nav-menu">
      <a class="nav-link nav-link-white active" href="index.html">首页</a>
      <a class="nav-link nav-link-white" href="blog.html">日志</a>
      <a class="nav-link nav-link-white" href="portfolio.html">作品集</a>
      <a class="nav-link nav-link-white" href="gallery.html">时光明信片</a>
      <a class="nav-link nav-link-white" href="me.html">我</a>
      <a class="lang-switch lang-switch-white" href="index-en.html">EN 🇬🇧</a>
    </div>
  </nav>

  <!-- ============================================================
       🌟 内容区: 头像 + 标题 + 入口卡片
       ============================================================ -->
  <div class="container container-home">
    <section class="home-hero">

      <!-- 个人头像 (樱花圆) -->
      <div class="home-avatar-wrap">
        <div class="home-avatar-bg"></div>
        <div class="home-avatar-emoji">🌸</div>
      </div>

      <!-- 标题 -->
      <h1 class="home-title home-title-white">
        <span>嗨，我是</span>
        <span class="home-title-name">侯小雯</span>
      </h1>

      <p class="home-subtitle home-subtitle-white">
        与 AI 同行 · 在数字世界里种一片小森林 🌲
      </p>

      <!-- 4 张入口卡片 -->
      <div class="home-entries">

        <a href="blog.html" class="entry-card entry-blog">
          <div class="entry-icon">
            <span class="entry-icon-main">📖</span>
          </div>
          <div class="entry-text">
            <h3>日志</h3>
            <p>记录灵感与日常</p>
          </div>
        </a>

        <a href="portfolio.html" class="entry-card entry-portfolio">
          <div class="entry-icon">
            <span class="entry-icon-main">🎨</span>
          </div>
          <div class="entry-text">
            <h3>作品集</h3>
            <p>AI 产品与想法实验</p>
          </div>
        </a>

        <a href="gallery.html" class="entry-card entry-gallery">
          <div class="entry-icon">
            <span class="entry-icon-main">📮</span>
          </div>
          <div class="entry-text">
            <h3>时光明信片</h3>
            <p>被镜头定格的片刻</p>
          </div>
        </a>

        <a href="me.html" class="entry-card entry-me">
          <div class="entry-icon">
            <span class="entry-icon-main">🌿</span>
          </div>
          <div class="entry-text">
            <h3>我</h3>
            <p>关于我的故事</p>
          </div>
        </a>

      </div>

    </section>
  </div>

  <!-- ============================================================
       🦶 页脚
       ============================================================ -->
  <footer class="footer footer-home">
    <p>© 2025 侯小雯 · Made with <span class="footer-heart">♥</span></p>
  </footer>

  <!-- ============================================================
       🎬 粒子动画脚本
       ============================================================ -->
  <script src="home-particles.js"></script>

</body>
</html>
