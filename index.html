  <script>
    // 鼠标视差效果
    const coverHero = document.getElementById('coverHero');
    const layers = coverHero.querySelectorAll('[data-depth]');

    coverHero.addEventListener('mousemove', (e) => {
      const rect = coverHero.getBoundingClientRect();
      const x = (e.clientX - rect.left) / rect.width - 0.5;
      const y = (e.clientY - rect.top) / rect.height - 0.5;

      layers.forEach(layer => {
        const depth = parseFloat(layer.getAttribute('data-depth'));
        const moveX = x * depth * 60;
        const moveY = y * depth * 40;
        layer.style.transform = `translate(${moveX}px, ${moveY}px)`;
      });
    });

    coverHero.addEventListener('mouseleave', () => {
      layers.forEach(layer => {
        layer.style.transform = 'translate(0, 0)';
      });
    });

    // 点击大门平滑滚动
    const forestGate = document.getElementById('forestGate');
    forestGate.addEventListener('click', (e) => {
      e.preventDefault();
      const entries = document.getElementById('entries');
      entries.scrollIntoView({ behavior: 'smooth' });
    });
  </script>
