<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>日志 · 侯小雯</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/marked@11.1.0/marked.min.js"></script>
</head>
<body>
  <div class="cloud cloud-1"></div>
  <div class="cloud cloud-2"></div>
  <div class="cloud cloud-3"></div>

  <nav class="nav">
    <a class="nav-brand" href="index.html">侯小雯</a>
    <div class="nav-menu">
      <a class="nav-link" href="index.html">首页</a>
      <a class="nav-link active" href="blog.html">日志</a>
      <a class="nav-link" href="gallery.html">时光明信片</a>
      <a class="nav-link" href="admin.html">管理</a>
      <a class="nav-link" href="me.html">我</a>
    </div>
  </nav>

  <div class="container">

    <section id="list-view">
      <div class="page-header">
        <h1 class="page-title">📔 日志</h1>
        <p class="page-subtitle">记录一些灵感与日常</p>
      </div>
      <div class="content-section">
        <div id="post-list" class="blog-list"></div>
      </div>
    </section>

    <section id="article-view" style="display:none;">
      <div class="page-header">
        <p style="margin-bottom:12px;font-size:14px;">
          <a href="blog.html" style="color:var(--accent);">← 返回文章列表</a>
        </p>
        <h1 id="article-title" class="page-title" style="font-size:36px;">加载中…</h1>
        <p id="article-date" class="page-subtitle" style="color:var(--accent);"></p>
      </div>
      <div class="content-section">
        <article id="article-content" class="markdown-body"></article>
      </div>
    </section>

  </div>

  <div class="scene-footer">
    <div class="grass-line">🌿🌿🌿🌿🌿🌿🌿🌿🌿🌿🌿🌿🌿</div>
    <div class="forest-ground">
      <span>🏡</span><span>🌳</span><span>🌲</span><span>🍄</span><span>🌼</span><span>🐑</span><span>🌲</span><span>🌳</span><span>🌾</span><span>🐄</span><span>🌲</span><span>🍄</span><span>🌸</span>
    </div>
    <p class="forest-quote">~ 在数字世界里种一片小森林 ~</p>
  </div>

  <footer class="footer"><p>© 2025 侯小雯 · Made with <span class="footer-heart">♥</span></p></footer>

  <script>
    function escapeHtml(s) {
      return String(s == null ? "" : s)
        .replace(/&/g, "&amp;").replace(/</g, "&lt;")
        .replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#39;");
    }

    const listView = document.getElementById("list-view");
    const articleView = document.getElementById("article-view");
    const postList = document.getElementById("post-list");

    async function showPostBySlug(slug) {
      listView.style.display = "none";
      articleView.style.display = "block";
      document.getElementById("article-title").textContent = "加载中…";
      document.getElementById("article-content").innerHTML = "";
      try {
        const res = await fetch("/api/posts?slug=" + encodeURIComponent(slug));
        if (!res.ok) throw new Error("文章不存在");
        const post = await res.json();
        document.getElementById("article-title").textContent = post.title || "";
        const meta = [];
        if (post.date) meta.push("📅 " + post.date);
        if (post.readTime) meta.push("⏱️ " + post.readTime);
        if (post.tags && post.tags.length) meta.push("🏷️ " + post.tags.join(", "));
        document.getElementById("article-date").textContent = meta.join(" · ");
        try {
          document.getElementById("article-content").innerHTML = marked.parse(post.content || "");
        } catch (e) {
          document.getElementById("article-content").textContent = post.content || "";
        }
        document.title = (post.title || "日志") + " · 侯小雯";
      } catch (e) {
        document.getElementById("article-title").textContent = "哎呀，这篇文章不见了";
        document.getElementById("article-content").innerHTML = "<p>可能已删除，或数据库尚未初始化。</p>";
      }
      window.scrollTo(0, 0);
    }

    async function showList() {
      listView.style.display = "block";
      articleView.style.display = "none";
      document.title = "日志 · 侯小雯";
      postList.innerHTML = '<p style="padding:40px 0;text-align:center;color:var(--ink-soft);">正在从数据库拉取文章… 🌱</p>';

      try {
        const res = await fetch("/api/posts?limit=100");
        const data = await res.json();
        const posts = data.posts || [];
        if (posts.length === 0) {
          postList.innerHTML = `
            <div style="text-align:center;padding:50px 20px;">
              <div style="font-size:48px;margin-bottom:16px;">🌿</div>
              <p style="font-size:16px;color:var(--ink);">还没有文章 ✍️</p>
              <p style="margin-top:12px;color:var(--ink-soft);font-size:14px;">
                <a href="admin.html" style="color:var(--accent);">去管理后台</a> 写第一篇吧
              </p>
              <p style="margin-top:30px;color:var(--ink-soft);font-size:13px;">
                （如果数据库还没初始化，请先访问 <code>/api/seed</code>）
              </p>
            </div>`;
          return;
        }
        postList.innerHTML = posts.map((p) => `
          <div class="blog-card" onclick="location.hash='#/' + encodeURIComponent('${escapeHtml(p.slug)}');" style="cursor:pointer;">
            <div class="blog-card-title">
              <span class="blog-card-emoji">${escapeHtml(p.cover || "📝")}</span>
              <span>${escapeHtml(p.title)}</span>
            </div>
            <div class="blog-card-meta">
              ${p.date ? "📅 " + escapeHtml(p.date) : ""}
              ${p.readTime ? " · ⏱️ " + escapeHtml(p.readTime) : ""}
              ${p.tags && p.tags.length ? " · 🏷️ " + p.tags.map(escapeHtml).join(", ") : ""}
            </div>
            ${p.excerpt ? `<div class="blog-card-excerpt">${escapeHtml(p.excerpt)}</div>` : ""}
          </div>
        `).join("");
      } catch (e) {
        postList.innerHTML =
          '<p style="padding:40px 0;text-align:center;color:#c0392b;">加载失败：' + e.message + '</p>';
      }
    }

    function route() {
      const hash = location.hash || "";
      const m = hash.match(/^#\/(.+)/);
      if (m && m[1]) showPostBySlug(m[1]);
      else showList();
    }

    window.addEventListener("hashchange", route);
    route();
  </script>
</body>
</html>
